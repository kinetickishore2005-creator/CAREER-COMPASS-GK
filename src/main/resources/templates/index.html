<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Career Compass</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="bg-light">


<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🚀 Career Compass
        </a>


        <a href="/add" class="btn btn-success">
            + Add New Job
        </a>

    </div>

</nav>



<div class="container mt-5">


    <h2 class="mb-4">
        Job Application Dashboard
    </h2>



    <!-- Dashboard Cards -->

    <div class="row mb-4">


        <div class="col-md-4">

            <div class="card shadow text-center p-3">

                <h5>Total Applications</h5>

                <h2 th:text="${jobs.size()}">
                    0
                </h2>

            </div>

        </div>




        <div class="col-md-4">

            <div class="card shadow text-center p-3">

                <h5>Interviews</h5>

                <h2 th:text="${#lists.size(jobs.?[status.contains('Interview')])}">
                    0
                </h2>

            </div>

        </div>




        <div class="col-md-4">

            <div class="card shadow text-center p-3">

                <h5>Offers</h5>

                <h2 th:text="${#lists.size(jobs.?[status=='Offer Received'])}">
                    0
                </h2>

            </div>

        </div>


    </div>





    <!-- Search -->

    <div class="mb-4">

        <input type="text"
               id="searchInput"
               class="form-control"
               placeholder="🔍 Search company or role">

    </div>






    <!-- Job Table -->


    <div class="card shadow">


        <div class="card-body">


            <table class="table table-hover" id="jobTable">


                <thead class="table-dark">

                <tr>

                    <th>Company</th>

                    <th>Role</th>

                    <th>Location</th>

                    <th>Date</th>

                    <th>Status</th>

                    <th>Interview</th>

                    <th>Notes</th>

                    <th>Actions</th>

                </tr>


                </thead>



                <tbody>


                <tr th:each="job : ${jobs}">


                    <td th:text="${job.companyName}"></td>


                    <td th:text="${job.jobRole}"></td>


                    <td th:text="${job.location}"></td>


                    <td th:text="${job.applicationDate}"></td>



                    <td>


<span class="badge bg-warning text-dark"
      th:if="${job.status=='Applied'}">

Applied

</span>



                        <span class="badge bg-primary"
                              th:if="${job.status=='Interview Scheduled'}">

Interview

</span>



                        <span class="badge bg-info text-dark"
                              th:if="${job.status=='Interview Completed'}">

Completed

</span>



                        <span class="badge bg-success"
                              th:if="${job.status=='Offer Received'}">

Offer

</span>



                        <span class="badge bg-danger"
                              th:if="${job.status=='Rejected'}">

Rejected

</span>


                    </td>



                    <td th:text="${job.interviewDate}"></td>


                    <td th:text="${job.notes}"></td>




                    <td>


                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/edit/{id}(id=${job.id})}">

                            Edit

                        </a>



                        <a class="btn btn-sm btn-outline-danger"
                           th:href="@{/delete/{id}(id=${job.id})}"
                           onclick="return confirm('Delete this application?')">

                            Delete

                        </a>


                    </td>



                </tr>


                </tbody>


            </table>


        </div>


    </div>



</div>




<script>

    document.getElementById("searchInput")
    .addEventListener("keyup", function(){

    let value = this.value.toLowerCase();

    let rows = document.querySelectorAll("#jobTable tbody tr");


    rows.forEach(row => {

    let text = row.innerText.toLowerCase();

    row.style.display =
    text.includes(value) ? "" : "none";

    });

    });


</script>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
