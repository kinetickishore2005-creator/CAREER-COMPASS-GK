<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Edit Job | Career Compass</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>


<body class="bg-light">


<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🚀 Career Compass
        </a>

    </div>

</nav>



<div class="container mt-5">


    <div class="card shadow-lg p-4">


        <h2 class="mb-4">
            ✏️ Edit Job Application
        </h2>



        <form th:action="@{/save}"
              th:object="${jobApplication}"
              method="post">


            <!-- Hidden ID for update -->

            <input type="hidden" th:field="*{id}">



            <div class="mb-3">

                <label class="form-label">
                    Company Name
                </label>

                <input class="form-control"
                       type="text"
                       th:field="*{companyName}"
                       required>

            </div>




            <div class="mb-3">

                <label class="form-label">
                    Job Role
                </label>

                <input class="form-control"
                       type="text"
                       th:field="*{jobRole}"
                       required>

            </div>




            <div class="mb-3">

                <label class="form-label">
                    Location
                </label>

                <input class="form-control"
                       type="text"
                       th:field="*{location}"
                       required>

            </div>




            <div class="mb-3">

                <label class="form-label">
                    Application Date
                </label>

                <input class="form-control"
                       type="date"
                       th:field="*{applicationDate}"
                       required>

            </div>




            <div class="mb-3">

                <label class="form-label">
                    Status
                </label>


                <select class="form-select"
                        th:field="*{status}">


                    <option value="Applied">
                        Applied
                    </option>


                    <option value="Interview Scheduled">
                        Interview Scheduled
                    </option>


                    <option value="Interview Completed">
                        Interview Completed
                    </option>


                    <option value="Offer Received">
                        Offer Received
                    </option>


                    <option value="Rejected">
                        Rejected
                    </option>


                </select>


            </div>




            <div class="mb-3">

                <label class="form-label">
                    Interview Date
                </label>

                <input class="form-control"
                       type="date"
                       th:field="*{interviewDate}">

            </div>




            <div class="mb-3">

                <label class="form-label">
                    Notes
                </label>

                <textarea class="form-control"
                          th:field="*{notes}"
                          rows="4"></textarea>

            </div>




            <button type="submit"
                    class="btn btn-success">

                💾 Update Job

            </button>



            <a href="/"
               class="btn btn-secondary">

                ← Back

            </a>


        </form>


    </div>


</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
